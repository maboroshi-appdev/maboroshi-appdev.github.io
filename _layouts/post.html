<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% seo %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --sky-top: #3d7fc4;
            --sky-mid: #6aaade;
            --sky-bottom: #d6ecf8;
            --bg-content: #edf3f9;
            --bg-footer: #e4ecf4;
            --text-primary: #1a2b3c;
            --text-secondary: #6b7f94;
            --text-tertiary: #94a3b5;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-light: rgba(59, 130, 246, 0.08);
            --accent-border: rgba(59, 130, 246, 0.15);
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.7);
            --glass-shadow: 0 8px 32px rgba(74, 144, 217, 0.08);
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text-primary);
            background: var(--bg-content);
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); text-decoration: underline; }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 14px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(237, 243, 249, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 1px 20px rgba(74, 144, 217, 0.06);
        }

        .nav-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
        }

        .nav-links { display: flex; gap: 32px; }

        .nav-links a {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
        }
        .nav-links a:hover { color: var(--accent); text-decoration: none; }

        /* Article */
        .article-header {
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 60%, var(--bg-content) 100%);
            padding: 120px 24px 80px;
            text-align: center;
        }

        .article-header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            color: white;
            letter-spacing: -0.02em;
            max-width: 720px;
            margin: 0 auto 16px;
            text-shadow: 0 2px 30px rgba(74, 144, 217, 0.3);
        }

        .article-meta {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.9375rem;
        }

        .article-body {
            max-width: 720px;
            margin: -40px auto 0;
            padding: 48px 40px 56px;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--glass-shadow);
            position: relative;
        }

        .article-body h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin: 40px 0 16px;
            color: var(--text-primary);
        }

        .article-body h3 {
            font-size: 1.125rem;
            font-weight: 600;
            margin: 32px 0 12px;
            color: var(--text-primary);
        }

        .article-body p {
            font-size: 1.0625rem;
            line-height: 1.8;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .article-body ul, .article-body ol {
            margin: 0 0 16px 24px;
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 1.0625rem;
        }

        .article-body li { margin-bottom: 8px; }

        .article-body strong { color: var(--text-primary); }

        .article-body blockquote {
            border-left: 3px solid var(--accent);
            padding: 12px 20px;
            margin: 24px 0;
            background: var(--accent-light);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* CTA card */
        .cta-card {
            background: linear-gradient(135deg, var(--accent-light), rgba(59, 130, 246, 0.04));
            border: 1px solid var(--accent-border);
            border-radius: var(--radius-md);
            padding: 28px 24px;
            margin: 32px 0;
            text-align: center;
        }

        .cta-card h3 {
            margin: 0 0 8px;
            color: var(--text-primary);
        }

        .cta-card p {
            font-size: 0.9375rem;
            margin-bottom: 16px;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--text-primary);
            color: white;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9375rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .cta-btn:hover {
            background: var(--accent);
            color: white;
            text-decoration: none;
            transform: translateY(-2px);
        }

        /* Footer */
        .post-footer {
            max-width: 720px;
            margin: 40px auto 0;
            padding: 32px 24px;
            text-align: center;
        }

        .back-link {
            font-size: 0.9375rem;
            color: var(--text-secondary);
        }

        footer {
            background: var(--bg-footer);
            padding: 40px 24px 32px;
            text-align: center;
            margin-top: 40px;
        }

        .footer-copyright {
            font-size: 0.8125rem;
            color: var(--text-tertiary);
        }

        @media (max-width: 768px) {
            .navbar { padding: 12px 20px; }
            .nav-links { gap: 20px; }
            .article-header { padding: 100px 20px 60px; }
            .article-body { margin: -30px 16px 0; padding: 32px 24px 40px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="nav-logo">KM</a>
        <div class="nav-links">
            <a href="/#apps">Apps</a>
            <a href="/blog/">Blog</a>
            <a href="/#contact">Contact</a>
        </div>
    </nav>

    <header class="article-header">
        <h1>{{ page.title }}</h1>
        <p class="article-meta">{{ page.date | date: "%B %d, %Y" }}</p>
    </header>

    <article class="article-body">
        {{ content }}
    </article>

    <div class="post-footer">
        <a href="/blog/" class="back-link">&larr; All posts</a>
    </div>

    <footer>
        <p class="footer-copyright">&copy; {{ site.time | date: "%Y" }} Kumo Maboroshi. All rights reserved.</p>
    </footer>

</body>
</html>
