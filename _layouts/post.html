<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% seo %}

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --sky-top: #c0392b;
            --sky-mid: #e67e22;
            --bg-content: #faf7f2;
            --bg-footer: #f0ebe3;
            --text-primary: #2c2420;
            --text-secondary: #6b5e54;
            --text-tertiary: #746555;
            --accent: #c0392b;
            --accent-hover: #a93226;
            --warm-gold: #d4a853;
            --radius-lg: 24px;
            --radius-md: 16px;

            /* Callout colors */
            --tip-bg: #f0faf0;
            --tip-border: #4caf50;
            --tip-icon-bg: #e8f5e9;
            --critical-bg: #fef2f2;
            --critical-border: #c0392b;
            --critical-icon-bg: #fee2e2;
            --info-bg: #fdf8ef;
            --info-border: #d4a853;
            --info-icon-bg: #fef3c7;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text-primary);
            background: var(--bg-content);
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); }

        /* Reading progress bar */
        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--warm-gold));
            z-index: 2000;
            transition: width 0.1s linear;
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 14px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(250, 247, 242, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 168, 83, 0.15);
            box-shadow: 0 1px 20px rgba(44, 36, 32, 0.04);
        }

        .nav-logo {
            font-family: 'DM Serif Display', serif;
            font-size: 1.25rem;
            font-weight: 400;
            color: var(--text-primary);
            text-decoration: none;
        }

        .nav-links { display: flex; gap: 32px; }

        .nav-links a {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
        }
        .nav-links a:hover { color: var(--accent); text-decoration: none; }

        /* Article header */
        .article-header {
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 55%, var(--bg-content) 100%);
            padding: 120px 24px 80px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .article-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 80%, rgba(255,255,255,0.06) 1px, transparent 1px),
                        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.06) 1px, transparent 1px),
                        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 30px 30px, 40px 40px, 20px 20px;
            pointer-events: none;
        }

        .article-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 400;
            color: white;
            letter-spacing: -0.01em;
            max-width: 720px;
            margin: 0 auto 16px;
            text-shadow: 0 2px 30px rgba(192, 57, 43, 0.3);
            position: relative;
        }

        .article-meta {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9375rem;
            position: relative;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.2);
        }

        /* Table of Contents */
        .toc {
            max-width: 760px;
            margin: -20px auto 24px;
            padding: 24px 28px;
            background: linear-gradient(135deg, #fdf8ef, #faf5ea);
            border: 1px solid rgba(212, 168, 83, 0.3);
            border-radius: var(--radius-md);
            position: relative;
            box-shadow: 0 4px 20px rgba(44, 36, 32, 0.04);
        }

        .toc-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .toc-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 24px;
        }

        .toc-list li a {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 5px 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .toc-list li a:hover { color: var(--accent); }

        .toc-list li a .toc-num {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-tertiary);
            min-width: 20px;
        }

        .toc-list li.toc-active a { color: var(--accent); font-weight: 600; }
        .toc-list li.toc-active a .toc-num { color: var(--accent); }

        /* Article body */
        .article-body {
            max-width: 760px;
            margin: 0 auto;
            padding: 48px 48px 56px;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: 0 8px 32px rgba(44, 36, 32, 0.06);
            position: relative;
        }

        /* Scroll-triggered fade-in (only when JS is active) */
        .js-enhanced .article-body > * {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .js-enhanced .article-body > .visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (prefers-reduced-motion: reduce) {
            .js-enhanced .article-body > * {
                opacity: 1;
                transform: none;
                transition: none;
            }
        }

        /* h2 section breaks */
        .article-body h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.75rem;
            font-weight: 400;
            margin: 56px 0 20px;
            padding-top: 32px;
            color: var(--text-primary);
            border-top: 2px solid var(--warm-gold);
            position: relative;
        }

        .article-body h2::after {
            content: '';
            display: block;
            width: 48px;
            height: 3px;
            background: var(--warm-gold);
            margin-top: 12px;
            border-radius: 2px;
        }

        .article-body h2:first-child {
            margin-top: 0;
            border-top: none;
            padding-top: 0;
        }

        .article-body h3 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.25rem;
            font-weight: 400;
            margin: 36px 0 12px;
            color: var(--text-primary);
        }

        .article-body p {
            font-size: 1.0625rem;
            line-height: 1.85;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .article-body ul, .article-body ol {
            margin: 0 0 16px 24px;
            color: var(--text-secondary);
            line-height: 1.85;
            font-size: 1.0625rem;
        }

        .article-body li { margin-bottom: 8px; }

        .article-body strong { color: var(--text-primary); }

        /* Link styling */
        .article-body a {
            color: var(--accent);
            text-decoration: underline;
            text-decoration-color: rgba(192, 57, 43, 0.3);
            text-underline-offset: 3px;
            transition: text-decoration-color 0.2s;
        }

        .article-body a:hover {
            text-decoration-color: var(--accent);
        }

        /* Blockquote */
        .article-body blockquote {
            border-left: 4px solid var(--warm-gold);
            padding: 16px 24px;
            margin: 24px 0;
            background: #fdf8ef;
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            color: var(--text-secondary);
            font-style: italic;
            font-size: 1.0625rem;
            position: relative;
        }

        .article-body blockquote::before {
            content: '\201C';
            font-family: 'DM Serif Display', serif;
            font-size: 3rem;
            color: var(--warm-gold);
            position: absolute;
            top: -8px;
            left: 12px;
            line-height: 1;
            opacity: 0.5;
        }

        .article-body blockquote p {
            padding-left: 8px;
        }

        /* Table styling */
        .table-wrapper {
            overflow-x: auto;
            margin: 24px 0;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(44, 36, 32, 0.06);
        }

        .article-body table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9375rem;
            border-radius: 12px;
            overflow: hidden;
        }

        .article-body thead th {
            background: var(--text-primary);
            color: white;
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.8125rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .article-body tbody td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(212, 168, 83, 0.12);
            color: var(--text-secondary);
        }

        .article-body tbody tr:nth-child(even) {
            background: rgba(212, 168, 83, 0.06);
        }

        .article-body tbody tr:hover {
            background: rgba(212, 168, 83, 0.12);
        }

        .article-body tbody td strong {
            color: var(--text-primary);
        }

        /* Callout boxes */
        .callout {
            display: flex;
            gap: 14px;
            padding: 18px 20px;
            margin: 24px 0;
            border-radius: 12px;
            font-size: 0.9875rem;
            line-height: 1.7;
        }

        .callout-icon {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            margin-top: 1px;
        }

        .callout-content { flex: 1; min-width: 0; }
        .callout-content p { margin-bottom: 8px; }
        .callout-content p:last-child { margin-bottom: 0; }
        .callout-content ul { margin: 8px 0 0 20px; }
        .callout-content li { margin-bottom: 6px; }

        .callout--tip {
            background: var(--tip-bg);
            border-left: 4px solid var(--tip-border);
        }
        .callout--tip .callout-icon { background: var(--tip-icon-bg); }

        .callout--critical {
            background: var(--critical-bg);
            border-left: 4px solid var(--critical-border);
        }
        .callout--critical .callout-icon { background: var(--critical-icon-bg); }

        .callout--info {
            background: var(--info-bg);
            border-left: 4px solid var(--info-border);
        }
        .callout--info .callout-icon { background: var(--info-icon-bg); }

        /* CTA card */
        .cta-card {
            background: linear-gradient(135deg, #fdf8ef 0%, #faf5ea 50%, #f8f0dd 100%);
            border: 1px solid rgba(212, 168, 83, 0.3);
            border-radius: var(--radius-md);
            padding: 32px 28px;
            margin: 36px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .cta-card::before,
        .cta-card::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 168, 83, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .cta-card::before { top: -20px; left: -20px; }
        .cta-card::after { bottom: -20px; right: -20px; }

        .cta-card h3 {
            font-family: 'DM Serif Display', serif;
            margin: 0 0 8px;
            color: var(--text-primary);
            font-weight: 400;
        }

        .cta-card p {
            font-size: 0.9375rem;
            margin-bottom: 16px;
        }

        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            background: var(--accent);
            color: white;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9375rem;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(192, 57, 43, 0.2);
        }
        .cta-btn:hover {
            background: var(--accent-hover);
            color: white;
            text-decoration: none;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(192, 57, 43, 0.3);
        }

        /* Ordered list (checklist) */
        .article-body ol {
            list-style: none;
            counter-reset: checklist;
            padding-left: 0;
            margin-left: 0;
        }

        .article-body ol li {
            counter-increment: checklist;
            padding: 10px 12px 10px 48px;
            position: relative;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .article-body ol li:hover {
            background: rgba(212, 168, 83, 0.06);
        }

        .article-body ol li::before {
            content: counter(checklist);
            position: absolute;
            left: 6px;
            top: 10px;
            width: 28px;
            height: 28px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8125rem;
            font-weight: 700;
        }

        /* Footer */
        .post-footer {
            max-width: 760px;
            margin: 40px auto 0;
            padding: 32px 24px;
            text-align: center;
        }

        .back-link {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            text-decoration: none;
        }
        .back-link:hover { color: var(--accent); }

        footer {
            background: var(--bg-footer);
            padding: 40px 24px 32px;
            text-align: center;
            margin-top: 40px;
        }

        .footer-copyright {
            font-size: 0.8125rem;
            color: var(--text-tertiary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar { padding: 12px 20px; }
            .nav-links { gap: 20px; }
            .article-header { padding: 100px 20px 60px; }
            .article-body { margin: 0 16px; padding: 32px 24px 40px; }
            .toc { margin: -20px 16px 20px; }
            .toc-list { grid-template-columns: 1fr; }
            .table-wrapper { margin: 16px -12px; border-radius: 8px; }
        }

        @media (max-width: 480px) {
            .article-body { padding: 24px 18px 32px; }
            .toc { padding: 18px 20px; }
        }
    </style>
</head>
<body>

    <div class="reading-progress" id="reading-progress"></div>

    <nav class="navbar">
        <a href="/" class="nav-logo">KM</a>
        <div class="nav-links">
            <a href="/#apps">Apps</a>
            <a href="/blog/">Blog</a>
            <a href="/#contact">Contact</a>
        </div>
    </nav>

    <header class="article-header">
        <h1>{{ page.title }}</h1>
        <p class="article-meta">{{ page.date | date: "%B %d, %Y" }}</p>
    </header>

    <nav class="toc" id="toc" style="display:none;">
        <p class="toc-title">In This Article</p>
        <ol class="toc-list" id="toc-list"></ol>
    </nav>

    <article class="article-body" id="article-body">
        {{ content }}
    </article>

    <div class="post-footer">
        <a href="/blog/" class="back-link">&larr; All posts</a>
    </div>

    <footer>
        <p class="footer-copyright">&copy; {{ site.time | date: "%Y" }} Kumo Maboroshi. All rights reserved.</p>
    </footer>

    <script>
    (function() {
        /* --- Reading progress bar --- */
        var progressBar = document.getElementById('reading-progress');
        window.addEventListener('scroll', function() {
            var scrollTop = window.scrollY;
            var docHeight = document.documentElement.scrollHeight - window.innerHeight;
            var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
            progressBar.style.width = Math.min(progress, 100) + '%';
        }, { passive: true });

        var article = document.getElementById('article-body');

        /* --- Table wrapping --- */
        var tables = article.querySelectorAll('table');
        tables.forEach(function(table) {
            if (!table.parentElement.classList.contains('table-wrapper')) {
                var wrapper = document.createElement('div');
                wrapper.className = 'table-wrapper';
                table.parentNode.insertBefore(wrapper, table);
                wrapper.appendChild(table);
            }
        });

        /* --- Callout transforms --- */
        var paragraphs = article.querySelectorAll('p');
        paragraphs.forEach(function(p) {
            var text = p.textContent.trim();
            var html = p.innerHTML;
            var calloutType = null;
            var icon = '';

            if (text.indexOf('Pro tip:') === 0 || text.indexOf('Pro Tip:') === 0) {
                calloutType = 'tip';
                icon = '\uD83D\uDCA1'; /* lightbulb */
                html = html.replace(/Pro [Tt]ip:\s*/, '');
            } else if (html.indexOf('<strong>Critical</strong>:') !== -1) {
                calloutType = 'critical';
                icon = '\u26A0\uFE0F'; /* warning */
                html = html.replace(/<strong>Critical<\/strong>:\s*/, '');
            } else if (html.indexOf('<strong>What to know:</strong>') !== -1) {
                calloutType = 'info';
                icon = '\uD83D\uDCCC'; /* pin */
                html = html.replace(/<strong>What to know:<\/strong>/, '');
            }

            if (calloutType) {
                var callout = document.createElement('div');
                callout.className = 'callout callout--' + calloutType;

                var iconDiv = document.createElement('div');
                iconDiv.className = 'callout-icon';
                iconDiv.textContent = icon;

                var contentDiv = document.createElement('div');
                contentDiv.className = 'callout-content';

                var newP = document.createElement('p');
                newP.innerHTML = html.trim();
                contentDiv.appendChild(newP);

                /* For info callout, absorb the following <ul> */
                if (calloutType === 'info') {
                    var next = p.nextElementSibling;
                    if (next && next.tagName === 'UL') {
                        contentDiv.appendChild(next.cloneNode(true));
                        next.remove();
                    }
                }

                callout.appendChild(iconDiv);
                callout.appendChild(contentDiv);
                p.parentNode.replaceChild(callout, p);
            }
        });

        /* --- Table of Contents (requires IntersectionObserver) --- */
        var headings = article.querySelectorAll('h2');
        var toc = document.getElementById('toc');
        var tocList = document.getElementById('toc-list');

        if (headings.length >= 3) {
            toc.style.display = 'block';
            headings.forEach(function(h, i) {
                var id = 'section-' + (i + 1);
                h.id = id;
                var li = document.createElement('li');
                var a = document.createElement('a');
                a.href = '#' + id;
                var num = document.createElement('span');
                num.className = 'toc-num';
                num.textContent = String(i + 1).padStart(2, '0');
                a.appendChild(num);
                a.appendChild(document.createTextNode(h.textContent));
                li.appendChild(a);
                tocList.appendChild(li);
            });

            /* Active section tracking */
            if ('IntersectionObserver' in window) {
                var tocItems = tocList.querySelectorAll('li');
                var tocObserver = new IntersectionObserver(function(entries) {
                    entries.forEach(function(entry) {
                        if (entry.isIntersecting) {
                            var id = entry.target.id;
                            tocItems.forEach(function(item) { item.classList.remove('toc-active'); });
                            var idx = Array.from(headings).findIndex(function(h) { return h.id === id; });
                            if (idx >= 0) tocItems[idx].classList.add('toc-active');
                        }
                    });
                }, { rootMargin: '-20% 0px -70% 0px' });

                headings.forEach(function(h) { tocObserver.observe(h); });
            }
        }

        /* --- Scroll-triggered fade-in (requires IntersectionObserver) --- */
        if ('IntersectionObserver' in window && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            document.documentElement.classList.add('js-enhanced');

            var fadeObserver = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        fadeObserver.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });

            var children = article.children;
            for (var i = 0; i < children.length; i++) {
                fadeObserver.observe(children[i]);
            }
        }
    })();
    </script>

</body>
</html>
